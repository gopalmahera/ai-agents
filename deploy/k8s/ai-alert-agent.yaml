---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-alert-agent-catalog
  namespace: monitoring
data:
  alert_catalog.yaml: |
    # Override or extend built-in alert descriptions.
    # Format: alertname: "one-line description"
    # Example:
    # MyCustomAlert: "Custom alert fired when X exceeds threshold Y."

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-alert-agent
  namespace: monitoring
  # IRSA — for AWS Bedrock and/or the CloudWatch data source. Create an IAM role
  # with a trust policy for this ServiceAccount (via eksctl/IAM OIDC) granting:
  #   Bedrock:    bedrock:InvokeModel, bedrock:InvokeModelWithResponseStream
  #   CloudWatch: cloudwatch:GetMetricData, cloudwatch:GetMetricStatistics,
  #               cloudwatch:ListMetrics, cloudwatch:DescribeAlarms,
  #               logs:FilterLogEvents, logs:StartQuery, logs:GetQueryResults
  # then set its ARN here. Per-environment AWS endpoints may also assume a
  # cross-account role (sts:AssumeRole) configured in Settings → Endpoint Mgmt.
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::414448255958:role/ai-alert-agent-bedrock

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-alert-agent-role
rules:
  - apiGroups: ['']
    resources: ['namespaces', 'pods', 'pods/log', 'pods/status', 'events']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources: ['deployments', 'replicasets']
    verbs: ['get', 'list', 'watch']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-alert-agent-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-alert-agent-role
subjects:
  - kind: ServiceAccount
    name: ai-alert-agent
    namespace: monitoring

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-alert-agent-redis
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-alert-agent-redis
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-alert-agent-redis
  template:
    metadata:
      labels:
        app: ai-alert-agent-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: ai-alert-agent-redis

---
apiVersion: v1
kind: Service
metadata:
  name: ai-alert-agent-redis
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app: ai-alert-agent-redis

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-alert-agent-logs
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-alert-agent
  namespace: monitoring
  annotations:
    reloader.stakater.com/auto: 'true'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-alert-agent
  template:
    metadata:
      labels:
        app: ai-alert-agent
    spec:
      serviceAccountName: ai-alert-agent
      containers:
        - name: ai-alert-agent
          image: 414448255958.dkr.ecr.ap-south-1.amazonaws.com/prometheus/ai-alert-agent:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-alert-agent-secrets
                  key: openai-api-key
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: ai-alert-agent-secrets
                  key: slack-webhook-url
            - name: OPENAI_MODEL
              value: gpt-4o
            - name: PROMETHEUS_URL
              value: http://service-gps.monitoring.svc.cluster.local:9090
            - name: LOKI_URL
              value: http://loki-gateway.monitoring.svc.cluster.local
            - name: LOGS_DIR
              value: /app/logs
            - name: DEDUP_TTL_SECONDS
              value: '900'
            - name: ALERT_CATALOG_PATH
              value: /app/config/alert_catalog.yaml
            - name: REDIS_URL
              value: redis://ai-alert-agent-redis.monitoring.svc.cluster.local:6379/0
            - name: INVESTIGATION_MAX_WORKERS
              value: '8'
            - name: AGENT_PORT
              value: '8080'
            - name: RUNBOOK_BASE_URL
              value: https://wiki.dozee.internal/runbooks
            # AWS Bedrock + CloudWatch: default region for the pod IAM role
            # (IRSA). Credentials are supplied by the ServiceAccount role above;
            # per-environment AWS endpoints may override region/role in the UI.
            - name: AWS_REGION
              value: ap-south-1
            # ── Optional: deployment-managed provider secrets ──────────────────
            # Prefer these over the Web UI if you don't want secrets stored in Redis.
            # - name: ANTHROPIC_API_KEY
            #     valueFrom: { secretKeyRef: { name: ai-alert-agent-secrets, key: anthropic-api-key } }
            # Gemini (Vertex) via a mounted GCP service-account JSON:
            # - name: GOOGLE_GENAI_USE_VERTEXAI
            #   value: 'true'
            # - name: GOOGLE_CLOUD_PROJECT
            #   value: my-gcp-project
            # - name: GOOGLE_CLOUD_LOCATION
            #   value: us-central1
            # - name: GOOGLE_APPLICATION_CREDENTIALS
            #   value: /var/secrets/gcp/key.json
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: '0.25'
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            # Gemini (Vertex) — mount a GCP SA-JSON Secret (create it separately):
            #   kubectl -n monitoring create secret generic ai-alert-agent-gcp \
            #     --from-file=key.json=/path/to/sa.json
            # - name: gcp-sa
            #   mountPath: /var/secrets/gcp
            #   readOnly: true
            # Multi-environment Kubernetes — mount a multi-context kubeconfig so
            # the agent can investigate alerts in other clusters (Environments →
            # kube_context). Each context authenticates to its own cluster (on
            # EKS, an `aws eks get-token` exec entry + IRSA/perms per cluster).
            #   kubectl -n monitoring create secret generic ai-alert-agent-kubeconfig \
            #     --from-file=config=/path/to/multi-cluster-kubeconfig
            # - name: kubeconfig
            #   mountPath: /var/secrets/kube
            #   readOnly: true
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: ai-alert-agent-logs
        # - name: gcp-sa
        #   secret:
        #     secretName: ai-alert-agent-gcp
        # - name: kubeconfig
        #   secret:
        #     secretName: ai-alert-agent-kubeconfig

---
apiVersion: v1
kind: Service
metadata:
  name: ai-alert-agent
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app: ai-alert-agent
