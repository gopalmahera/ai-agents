---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-alert-agent-catalog
  namespace: monitoring
data:
  alert_catalog.yaml: |
    # Override or extend built-in alert descriptions.
    # Format: alertname: "one-line description"
    # Example:
    # MyCustomAlert: "Custom alert fired when X exceeds threshold Y."

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-alert-agent
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-alert-agent-role
rules:
  - apiGroups: ['']
    resources: ['namespaces', 'pods', 'pods/log', 'pods/status', 'events']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources: ['deployments', 'replicasets']
    verbs: ['get', 'list', 'watch']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-alert-agent-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-alert-agent-role
subjects:
  - kind: ServiceAccount
    name: ai-alert-agent
    namespace: monitoring

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-alert-agent-redis
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-alert-agent-redis
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-alert-agent-redis
  template:
    metadata:
      labels:
        app: ai-alert-agent-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: ai-alert-agent-redis

---
apiVersion: v1
kind: Service
metadata:
  name: ai-alert-agent-redis
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app: ai-alert-agent-redis

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-alert-agent-logs
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-alert-agent
  namespace: monitoring
  annotations:
    reloader.stakater.com/auto: 'true'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-alert-agent
  template:
    metadata:
      labels:
        app: ai-alert-agent
    spec:
      serviceAccountName: ai-alert-agent
      containers:
        - name: ai-alert-agent
          image: 414448255958.dkr.ecr.ap-south-1.amazonaws.com/prometheus/ai-alert-agent:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-alert-agent-secrets
                  key: openai-api-key
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: ai-alert-agent-secrets
                  key: slack-webhook-url
            - name: OPENAI_MODEL
              value: gpt-4o
            - name: PROMETHEUS_URL
              value: http://service-gps.monitoring.svc.cluster.local:9090
            - name: LOKI_URL
              value: http://loki-gateway.monitoring.svc.cluster.local
            - name: LOGS_DIR
              value: /app/logs
            - name: DEDUP_TTL_SECONDS
              value: '900'
            - name: ALERT_CATALOG_PATH
              value: /app/config/alert_catalog.yaml
            - name: REDIS_URL
              value: redis://ai-alert-agent-redis.monitoring.svc.cluster.local:6379/0
            - name: INVESTIGATION_MAX_WORKERS
              value: '8'
            - name: RUNBOOK_BASE_URL
              value: https://wiki.dozee.internal/runbooks
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: '0.25'
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: ai-alert-agent-logs

---
apiVersion: v1
kind: Service
metadata:
  name: ai-alert-agent
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: http
      protocol: TCP
  selector:
    app: ai-alert-agent
