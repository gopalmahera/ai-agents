# Production — built images, no source bind mounts
services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    env_file:
      - ../../.env
    volumes:
      - ../../logs:/app/logs
      - ../../config:/app/config
    environment:
      NODE_ENV: production
      API_PORT: '4000'
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: dai
      REDIS_URL: redis://redis:6379/0
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      LOGS_DIR: /app/logs
      CONFIG_ROOT: /app/config
      BULLMQ_PREFIX: dai
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ADMIN_TOKEN: ${ADMIN_TOKEN:-}
        API_INTERNAL_URL: http://api:4000
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    depends_on:
      - api
    restart: unless-stopped

  agent:
    build:
      context: ../..
      dockerfile: Dockerfile.agent
      platforms:
        - linux/amd64
    platform: linux/amd64
    env_file:
      - ../../.env
    volumes:
      - ../../logs:/app/logs
      - ../../config:/app/config
    environment:
      NODE_ENV: production
      PROMETHEUS_URL: ${PROMETHEUS_URL}
      LOKI_URL: ${LOKI_URL}
      LOGS_DIR: /app/logs
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: dai
      AGENT_ID: ${AGENT_ID:-default}
      AGENT_TOKEN: ${ADMIN_TOKEN:-}
      API_WS_URL: http://api:4000
      API_HTTP_URL: http://api:4000
      AGENT_PORT: '8080'
      ENABLE_FLASK_WEBHOOKS: 'false'
    depends_on:
      - api
      - redis
      - mongo
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
