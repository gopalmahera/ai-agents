services:
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  alert-agent:
    build:
      context: .
      platforms:
        - linux/amd64
    platform: linux/amd64
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./alert-agent/routing.yaml:/app/alert-agent/routing.yaml
      - ./config:/app/config
    environment:
      PROMETHEUS_URL: ${PROMETHEUS_URL}
      LOKI_URL: ${LOKI_URL}
      LOGS_DIR: /app/logs
      ROUTING_CONFIG_PATH: /app/alert-agent/routing.yaml
      CONFIG_STORE_PATH: /app/config/web_config.json
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://alert-agent:5001}
      NEXT_PUBLIC_ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    depends_on:
      - alert-agent

volumes:
  redis_data:
