services:
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    command: ['--quiet']
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  alert-agent:
    build:
      context: .
      platforms:
        - linux/amd64
    platform: linux/amd64
    ports:
      - '8080:8080'
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./alert-agent/routing.yaml:/app/alert-agent/routing.yaml
      - ./config:/app/config
    environment:
      PROMETHEUS_URL: ${PROMETHEUS_URL}
      LOKI_URL: ${LOKI_URL}
      LOGS_DIR: /app/logs
      ROUTING_CONFIG_PATH: /app/alert-agent/routing.yaml
      CONFIG_STORE_PATH: /app/config/web_config.json
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: alert_agent
      AGENT_PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: http://alert-agent:8080
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    ports:
      - '3000:3000'
    depends_on:
      - alert-agent

volumes:
  redis_data:
  mongo_data:
