# Slack channel routing for the AI alert agent.
# Rules are evaluated top-to-bottom; the first match wins.
#
# Matchers (AND-ed together within a rule):
#   match:    exact label equality  { label: value }
#   match_re: regex label match     { label: "regex" }
#
# The default_slack_webhook_url is used when no rule matches.
# If this key is absent, SLACK_WEBHOOK_URL env var is used as fallback.

default_slack_webhook_url: "${SLACK_WEBHOOK_URL}"

routes: []
# Examples — uncomment and fill in your webhook URLs:
#
#  # Critical prod alerts → #alerts-prod-critical
#  - match:
#      severity: critical
#      stage: prod
#    slack_webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
#
#  # All warning alerts → #alerts-warning
#  - match:
#      severity: warning
#    slack_webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
#
#  # EC2 / infra alerts → #infra-alerts
#  - match_re:
#      alertname: "^EC2Host.*"
#    slack_webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
#
#  # Kafka alerts → #kafka-alerts
#  - match_re:
#      alertname: "^(msk\\.|NetworkKafka).*"
#    slack_webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
#
#  # SIT / staging environment → #alerts-sit
#  - match_re:
#      stage: "sit|staging"
#    slack_webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
