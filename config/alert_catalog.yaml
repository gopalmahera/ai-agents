BlackboxHighLatency:
  description: HTTP probe latency exceeded 1.5 seconds — target is slow to respond.
  runbook: https://wiki.dozee.internal/runbooks/probe/blackbox-high-latency
BlackboxTCPProbeFailed:
  description: TCP probe to target failed — port is unreachable or connection refused.
  runbook: https://wiki.dozee.internal/runbooks/probe/blackbox-tcp-failed
BlackboxTargetDown:
  description: HTTP probe to target failed — endpoint returned no response or probe_success=0.
  runbook: https://wiki.dozee.internal/runbooks/probe/blackbox-target-down
EC2HostClockNotSynchronising:
  description: EC2 host NTP synchronisation is not active — clock accuracy degraded.
  runbook: https://wiki.dozee.internal/runbooks/ec2/clock-sync
EC2HostClockSkew:
  description: EC2 host system clock is skewed >50ms and diverging — NTP sync issue.
  runbook: https://wiki.dozee.internal/runbooks/ec2/clock-skew
EC2HostConntrackLimit:
  description: EC2 host connection tracking table is >80% full — new connections may
    be dropped.
  runbook: https://wiki.dozee.internal/runbooks/ec2/conntrack
EC2HostCpuStealNoisyNeighbor:
  description: EC2 host CPU steal time is elevated — noisy neighbor on the hypervisor.
  runbook: https://wiki.dozee.internal/runbooks/ec2/cpu-steal
EC2HostDiskWillFillIn24Hours:
  description: EC2 host filesystem is predicted to run out of disk space within 24
    hours.
  runbook: https://wiki.dozee.internal/runbooks/ec2/disk-space
EC2HostDown:
  description: Node-exporter scrape target is down — Prometheus cannot reach the EC2
    instance.
  runbook: https://wiki.dozee.internal/runbooks/ec2/host-down
EC2HostEdacCorrectableErrorsDetected:
  description: EC2 host EDAC correctable memory errors detected — hardware may be
    degrading.
  runbook: https://wiki.dozee.internal/runbooks/ec2/edac
EC2HostEdacUncorrectableErrorsDetected:
  description: EC2 host EDAC uncorrectable memory errors detected — hardware failure
    imminent.
  runbook: https://wiki.dozee.internal/runbooks/ec2/edac
EC2HostHighCPU:
  description: EC2 host CPU utilization exceeded the configured threshold.
  runbook: https://wiki.dozee.internal/runbooks/ec2/high-cpu
EC2HostHighCpuLoad:
  description: EC2 host CPU utilization exceeded 80% for the configured duration.
  runbook: https://wiki.dozee.internal/runbooks/ec2/high-cpu
EC2HostInodesWillFillIn24Hours:
  description: EC2 host filesystem inodes predicted to run out within 24 hours.
  runbook: https://wiki.dozee.internal/runbooks/ec2/inodes
EC2HostMemoryUnderMemoryPressure:
  description: EC2 host is under memory pressure with a high rate of major page faults.
  runbook: https://wiki.dozee.internal/runbooks/ec2/memory-pressure
EC2HostMemoryUnderUtilized:
  description: EC2 host memory has been under 20% utilization for 1 week — possible
    over-provisioning.
  runbook: https://wiki.dozee.internal/runbooks/ec2/memory-underutilized
EC2HostNetworkInterfaceSaturated:
  description: EC2 host network interface is >80% saturated (rx+tx approaching link
    speed).
  runbook: https://wiki.dozee.internal/runbooks/ec2/network-saturation
EC2HostNodeOvertemperatureAlarm:
  description: EC2 host critical over-temperature alarm triggered on a physical component.
  runbook: https://wiki.dozee.internal/runbooks/ec2/temperature
EC2HostOutOfDiskSpace:
  description: EC2 host filesystem has less than 10% disk space available.
  runbook: https://wiki.dozee.internal/runbooks/ec2/disk-space
EC2HostOutOfInodes:
  description: EC2 host filesystem has less than 10% inodes remaining.
  runbook: https://wiki.dozee.internal/runbooks/ec2/inodes
EC2HostOutOfMemory:
  description: EC2 host has less than 10% memory available.
  runbook: https://wiki.dozee.internal/runbooks/ec2/out-of-memory
EC2HostPhysicalComponentTooHot:
  description: EC2 host physical component temperature exceeded 75°C.
  runbook: https://wiki.dozee.internal/runbooks/ec2/temperature
EC2HostRaidArrayGotInactive:
  description: EC2 host RAID array became inactive due to disk failures — data at
    risk.
  runbook: https://wiki.dozee.internal/runbooks/ec2/raid
EC2HostRaidDiskFailure:
  description: EC2 host RAID array has at least one failed disk.
  runbook: https://wiki.dozee.internal/runbooks/ec2/raid
EC2HostSwapIsFillingUp:
  description: EC2 host swap space is over 80% used — memory pressure is spilling
    into swap.
  runbook: https://wiki.dozee.internal/runbooks/ec2/swap
EC2HostSystemdServiceCrashed:
  description: A systemd service on the EC2 host has entered the failed state.
  runbook: https://wiki.dozee.internal/runbooks/ec2/systemd-failed
EC2HostUnusualDiskReadLatency:
  description: EC2 host disk read operations are taking >100ms — storage may be degraded.
  runbook: https://wiki.dozee.internal/runbooks/ec2/disk-latency
EC2HostUnusualDiskReadRate:
  description: EC2 host disk read throughput is unusually high.
  runbook: https://wiki.dozee.internal/runbooks/ec2/disk-io
EC2HostUnusualDiskWriteLatency:
  description: EC2 host disk write operations are taking >100ms — storage may be degraded.
  runbook: https://wiki.dozee.internal/runbooks/ec2/disk-latency
EC2HostUnusualDiskWriteRate:
  description: EC2 host disk write throughput is unusually high.
  runbook: https://wiki.dozee.internal/runbooks/ec2/disk-io
EC2HostUnusualNetworkThroughputIn:
  description: EC2 host inbound network throughput is unusually high.
  runbook: https://wiki.dozee.internal/runbooks/ec2/network-throughput
EC2HostUnusualNetworkThroughputOut:
  description: EC2 host outbound network throughput is unusually high.
  runbook: https://wiki.dozee.internal/runbooks/ec2/network-throughput
NetworkKafkaHighBytesIn:
  description: Kafka topic inbound throughput exceeded 1024 KB/s — producers are sending
    a high volume of data.
  runbook: https://wiki.dozee.internal/runbooks/kafka/broker-throughput
NetworkKafkaHighBytesOut:
  description: Kafka topic outbound throughput exceeded 1024 KB/s — consumers or connectors
    are under high read load.
  runbook: https://wiki.dozee.internal/runbooks/kafka/broker-throughput
NetworkPodHighReceive:
  description: Pod network receive rate exceeded the configured threshold.
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-network-receive
NetworkPodHighTransmit:
  description: Pod network transmit rate exceeded the configured threshold.
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-network-transmit
PODCPULimitsUage>=90:
  description: Pod container CPU usage reached ≥90% of its configured CPU limit for
    5+ minutes.
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-cpu-limits
PODMemoryLimitsUage>=80:
  description: Pod container memory usage reached ≥80% of its configured memory limit
    for 5+ minutes.
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-memory-limits
PODMemoryLimitsUage>=90:
  description: Pod container memory usage reached ≥90% of its configured memory limit
    for 5+ minutes.
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-memory-limits
PodEvicted:
  description: Pod was evicted from its node due to resource pressure (memory, disk,
    or CPU).
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-evicted
PodOOMKilled:
  description: Pod container was killed by the kernel OOM reaper after exceeding its
    memory limit.
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-oom
PodRestart:
  description: Kubernetes pod container restarted within the last 5 minutes.
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-restart
PodRestarting:
  description: Kubernetes pod is in a restart loop — container keeps restarting.
  runbook: https://wiki.dozee.internal/runbooks/kubernetes/pod-restart
TLSCertificateExpiringSoon:
  description: TLS certificate for the probed target expires within the configured
    warning window.
  runbook: https://wiki.dozee.internal/runbooks/probe/tls-certificate-expiring
